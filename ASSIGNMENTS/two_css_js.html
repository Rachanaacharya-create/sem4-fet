    <!-- Input Validation Section -->
    <h3>Enter Grade (A / B / C)</h3>

    <input type="text" id="gradeInput" placeholder="Enter A, B, or C">
    <button onclick="checkGrade()">Submit</button>

    <script>
        function checkGrade() {
            let grade = document.getElementById("gradeInput").value.toUpperCase();

            if (grade === "A" || grade === "B" || grade === "C") {
                alert("Valid Grade: " + grade);
            } else {
                alert("Invalid Input! Please enter only A, B, or C.");
            }
        }
    </script>
